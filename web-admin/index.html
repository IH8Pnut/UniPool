<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPool Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #343a40; display: flex; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; margin: auto; padding: 20px; }
    </style>
</head>
<body>

<div class="card login-card shadow">
    <div class="card-body">
        <h3 class="text-center mb-4">UniPool Admin Login</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" value="admin@unipool.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" value="admin123" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div id="errorMsg" class="text-danger mt-3 text-center" style="display:none;"></div>
    </div>
</div>

<script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const response = await fetch('../api/login.php', {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (response.ok && result.user.role === 'Admin') {
            window.location.href = 'dashboard.html';
        } else {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = result.message || "Unauthorized access.";
            errorMsg.style.display = 'block';
        }
    };
</script>

</body>
</html>
